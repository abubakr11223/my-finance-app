<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance SuperApp</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #0e1117; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        /* ChatGPT Chat Oynasi */
        .chat-container { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .ai { background: #21262d; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #007bff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-input { background: #161b22; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; outline: none; }
        
        /* Menyu Tugmasi */
        .menu-btn { position: fixed; top: 15px; right: 15px; background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.3); z-index: 100; }
        
        /* Menyu Oynasi */
        .side-menu { position: fixed; top: 0; right: -100%; width: 250px; height: 100%; background: #161b22; transition: 0.3s; padding: 60px 20px 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); z-index: 90; }
        .side-menu.active { right: 0; }
        .menu-item { padding: 15px; border-bottom: 1px solid #30363d; cursor: pointer; display: block; text-decoration: none; color: white; font-size: 18px; }
        .menu-item:hover { background: #21262d; }
        
        /* Hisobot Oynasi (Grafik) */
        #report-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0e1117; z-index: 110; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .back-btn { background: #30363d; color: white; border: none; padding: 10px; border-radius: 8px; margin-bottom: 20px; width: 100%; font-weight: bold; }
        .card { background: #161b22; border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .balance { font-size: 28px; color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰ Menyu</button>

    <div class="chat-container">
        <div class="message ai">Salom Abubakr! Bugun qanday xarajatlarni hisobga olamiz? Men ChatGPT kabi aqlliman, so'rashingiz mumkin.</div>
    </div>
    <div class="chat-input">
        <input type="text" placeholder="Xabarni yozing...">
        <button style="background:none; border:none; color:#007bff; font-weight:bold; cursor:pointer;">Yuborish</button>
    </div>

    <div id="sideMenu" class="side-menu">
        <div class="menu-item" onclick="showReport()">📊 Hisobot</div>
        <div class="menu-item">⚙️ Sozlamalar</div>
        <div class="menu-item" onclick="toggleMenu()">❌ Yopish</div>
    </div>

    <div id="report-screen">
        <button class="back-btn" onclick="hideReport()">⬅️ Ortga qaytish (Chatga)</button>
        <div class="card">
            <p style="color: #8b949e; margin: 0;">UMUMIY BALANS</p>
            <div class="balance">12 450 000 UZS</div>
        </div>
        <div class="card">
            <canvas id="financeChart"></canvas>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        function showReport() { 
            document.getElementById('report-screen').style.display = 'block'; 
            toggleMenu();
            renderChart();
        }
        function hideReport() { document.getElementById('report-screen').style.display = 'none'; }

        function renderChart() {
            const ctx = document.getElementById('financeChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ovqat', 'Yo\'l', 'Uy', 'Boshqa'],
                    datasets: [{
                        data: [40, 20, 25, 15],
                        backgroundColor: ['#ff4b5c', '#007bff', '#ffca28', '#00ff88'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }
    </script>
</body>
</html>
