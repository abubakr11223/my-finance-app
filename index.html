<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abubakr AI Super App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background-color: #f0f2f5; height: 100vh; overflow: hidden; display: flex; }
        
        /* Yon Menyu - Skrinshotingizdagi kabi */
        .side-bar {
            width: 60px; background: white; height: 85vh; margin: auto 12px;
            border-radius: 28px; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-around; padding: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #efefef;
        }
        .side-item { font-size: 24px; cursor: pointer; transition: 0.2s; }
        .side-item:active { transform: scale(0.8); }

        .main-app { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Header */
        .header { text-align: center; padding: 60px 20px 0; }
        .logo-box { width: 75px; height: 75px; background: white; border-radius: 28px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        
        /* Chat Input Qismi */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 85px; right: 15px;
            background: white; border-radius: 40px; padding: 10px 18px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); border: 1px solid #f0f0f0;
        }
        .chat-input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; }
        
        .mic-btn {
            width: 44px; height: 44px; background: #007bff; border: none;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="side-bar">
        <span class="side-item" onclick="sendAction('hisobot')">📊</span>
        <span class="side-item" onclick="sendAction('xarajat')">➕</span>
        <span class="side-item" onclick="sendAction('uy')">🏠</span>
        <span class="side-item" onclick="sendAction('sozlamalar')">⚙️</span>
        <div style="width: 15px; height: 15px; background: #ddd; border-radius: 4px;"></div>
    </div>

    <div class="main-app">
        <div class="header">
            <div class="logo-box"><span style="font-size: 40px;">💰</span></div>
            <div style="font-size: 22px; font-weight: 800;">Abubakr Moliya AI</div>
        </div>

        <div style="text-align:center; margin-top:35px;">
            <h2 id="status">Привет, я Abubakr AI 👋</h2>
            <p style="color: #8e8e93;">Bugun nimalarni rejalashtiramiz? ✨</p>
        </div>

        <div class="bottom-nav">
            <span style="font-size: 24px; color: #b0b0b0;">📎</span>
            <input type="text" id="userInput" class="chat-input" placeholder="Xabarni yozing...">
            <button class="mic-btn" id="sendBtn" onclick="handleSend()">🎤</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        // Yozish boshlanganda mikrofonni "Yuborish" ikonkasiga o'zgartirish
        input.addEventListener('input', () => {
            btn.innerText = input.value.trim() ? "🚀" : "🎤";
        });

        // Xabar yuborish funksiyasi
        function handleSend() {
            const val = input.value.trim();
            if (val) {
                // Ma'lumotni JSON ko'rinishida Python-ga yuboramiz
                tg.sendData(JSON.stringify({type: 'chat', text: val}));
                input.value = "";
                btn.innerText = "🎤";
            }
        }

        // Yon menyu tugmalari uchun funksiya
        function sendAction(action) {
            tg.HapticFeedback.impactOccurred('medium'); // Tebranish
            tg.sendData(JSON.stringify({type: 'action', data: action}));
        }
    </script>
</body>
</html>
